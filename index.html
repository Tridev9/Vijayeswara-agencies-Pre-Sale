    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: #0E7C6B transparent;
            -webkit-tap-highlight-color: transparent
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }
        ::-webkit-scrollbar-thumb {
            background: #0E7C6B;
            border-radius: 2px
        }
        ::-webkit-scrollbar-track {
            background: transparent
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #F5F4F0;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
        }
        .fade-in {
            animation: fadeIn .25s ease
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px) }
            to { opacity: 1; transform: translateY(0) }
        }
        @keyframes slideUp {
            from { transform: translateY(100%) }
            to { transform: translateY(0) }
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(60px) }
            to { opacity: 1; transform: translateX(0) }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(60px) }
        }

        .qty-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; font-size: 16px; transition: all .1s; cursor: pointer; user-select: none }
        .qty-btn:active { transform: scale(.88) }
        .spinner { animation: spin 1s linear infinite; display: inline-block }
        input[type="number"]::-webkit-inner-spin-button,

        input[type="number"] { -moz-appearance: textfield }
        input, select, textarea { font-size: 16px !important }
        @media print { .no-print { display: none !important } }
        .bottom-nav { padding-bottom: env(safe-area-inset-bottom) }
        .rpt-table th { position: sticky; top: 0; background: #f9fafb; z-index: 2 }
        .rpt-table td, .rpt-table th { padding: 5px 8px; text-align: left; font-size: 11px; border-bottom: 1px solid #e5e7eb; white-space: nowrap }
        .rpt-cat-row td { background: #edfaf7 !important; font-weight: 700; color: #0a5e52; font-size: 10px; text-transform: uppercase; letter-spacing: .5px }
        .asset-card:active { transform: scale(.98) }
        .mobile-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 6px 0; font-size: 10px; font-weight: 500; color: #9ca3af; transition: color .12s; min-height: 48px; cursor: pointer; -webkit-user-select: none; user-select: none }
        .mobile-tab.active { color: #0E7C6B }
        .mobile-tab i { font-size: 18px }
        .card-shadow { box-shadow: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .03) }
        .touch-target { min-height: 44px; min-width: 44px }
        .contrib-bar { height: 6px; border-radius: 4px; background: #e5e7eb; overflow: hidden }
        .contrib-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #0E7C6B, #12A68E); transition: width .6s ease }
        .cart-bar-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 45; padding-bottom: calc(env(safe-area-inset-bottom) + 0px); background: transparent; pointer-events: none; }
        .cart-bar-fixed>* { pointer-events: auto; }
        .sync-status { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: #e5e7eb; color: #6b7280; }
        .sync-status.synced { background: #d1fae5; color: #065f46; }
        .sync-status.syncing { background: #fef3c7; color: #92400e; }
        .sync-status.error { background: #fee2e2; color: #991b1b; }
        .sidebar-item { transition: all .12s ease; cursor: pointer; }

        .sidebar-item.active { background: rgba(14, 124, 107, .12); color: #0E7C6B; font-weight: 600; }
        .sidebar-item i { width: 20px; text-align: center; }
        @media print { .page-break { page-break-before: always; } }

        .upload-progress-bar { height: 100%; background: linear-gradient(90deg, #0E7C6B, #12A68E); transition: width 0.3s ease; width: 0%; }
        .sync-btn { font-size: 10px; padding: 4px 10px; border-radius: 12px; background: #e5e7eb; color: #6b7280; cursor: pointer; transition: all 0.2s; border: none; }
        .sync-btn:hover { background: #d1d5db; }
        .sync-btn:active { transform: scale(.95); }
        .sync-btn i { margin-right: 4px; }

<body>
    <div id="app"></div>
    <div id="toast-container" class="fixed top-3 right-3 z-[200] flex flex-col gap-2 pointer-events-none"></div>
    <div id="modal-root"></div>
    
    <script>
        // ============================================================
        // FIREBASE CONFIGURATION
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB69L99LDuQeKq2LQmahZujifIWEiZ-nFQ",
            authDomain: "cooldrink-pro.firebaseapp.com",
            projectId: "cooldrink-pro",
            storageBucket: "cooldrink-pro.firebasestorage.app",
            messagingSenderId: "569175982162",
            appId: "1:569175982162:web:5f5cd0f4b209ed00ef9f8b"
        };

        let firestore = null;
        try {
            firebase.initializeApp(firebaseConfig);
            firestore = firebase.firestore();
            console.log('✅ Firebase initialized successfully');
        } catch (e) {
            console.warn('⚠️ Firebase init error:', e);
        }

        // ============================================================
        // PICDB CONFIGURATION
        // ============================================================
        const PICDB_UPLOAD_URL = 'https://picdb.vercel.app/api/upload';
        
        async function uploadToPicDB(file) {
            try {
                const compressedFile = await compressImage(file);
                const formData = new FormData();
                formData.append('image', compressedFile);
                
                const response = await fetch(PICDB_UPLOAD_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`Upload failed: ${response.status}`);
                }
                
                const data = await response.json();
                return data.url || data.imageUrl || data.data?.url;
            } catch (error) {
                console.error('PicDB upload error:', error);
                throw new Error('Failed to upload image to PicDB');
            }
        }

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height = height * (MAX_WIDTH / width);
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width = width * (MAX_HEIGHT / height);
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('Image compression failed'));
                            }
                        }, 'image/jpeg', 0.7);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // ============================================================
        // SQLite DB and State
        // ============================================================
        var db = null;
        var S = {
            user: null,
            role: null,
            userName: '',
            view: 'login',
            form: { shopName: '', shopPhone: '', shopLocation: '', shopLat: null, shopLng: null, items: [], discount: 0 },
            editingOrderId: null,
            catFilter: 'All',
            search: '',
            cartOpen: false,
            adminDate: new Date().toISOString().split('T')[0],
            adminSP: '',
            adminView: 'dashboard',
            adminStatusFilter: 'all',
            productModal: null,
            editingProduct: null,
            userModal: null,
            editingUser: null,
            orderDetailId: null,
            dbReady: false,
            loadSelection: {},
            _skipEnsure: false,
            rptSP: '',
            rptPeriod: 'thisMonth',
            rptFrom: '',
            rptTo: '',
            assetSearch: '',
            assetModal: null,
            editingAsset: null,
            assetViewId: null,
            assetPhoto: '',
            assetPhotoPreview: '',
            assetFile: null,
            uploadProgress: 0,
            isUploading: false,
            moreMenuOpen: false,
            syncStatus: 'synced',
            usersLoaded: false,
            isSyncingAll: false,
            lastSyncTime: null
        };

        function today() { return new Date().toISOString().split('T')[0] }
        function fmt(n) { if (n == null) return 'N/A'; return '\u20B9' + Number(n).toLocaleString('en-IN') }
        function fmtN(n) { if (n == null) return '0'; return Number(n).toLocaleString('en-IN') }
        function fmtKg(n) { return n.toFixed(1) + ' kg' }
        function fmtDate(d) { if (!d) return ''; var dt = new Date(d + (d.length === 10 ? 'T00:00:00' : '')); return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) }
        function parseML(pack) { var m = pack.match(/([\d.]+)(ml|Ltr)/i); if (!m) return 200; var v = parseFloat(m[1]); if (m[2].toLowerCase() === 'ltr') v *= 1000; return v }
        function genOrderId() { return 'CD-' + Date.now().toString(36).toUpperCase() }
        function genSKU(cat, idx) { var prefix = { Campa: 'CMP', Cans: 'CAN', 'Club Soda': 'SOD', Water: 'WTR', 'Jeera Up': 'JER', Raskik: 'RSK', Energy: 'ENG', Spinner: 'SPN', Suncrush: 'SNC', Milkshake: 'MSK' }; return 'CD-' + (prefix[cat] || 'OTH') + '-' + String(idx).padStart(3, '0') }
        function esc(s) { return s ? s.replace(/'/g, "''") : '' }
        function escH(s) { if (!s) return ''; return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }

        function toast(msg, type) {
            if (!type) type = 'success';
            var c = document.getElementById('toast-container');
            if (!c) return;
            var colors = { success: 'bg-pri text-white', error: 'bg-danger text-white', info: 'bg-gray-800 text-white', warning: 'bg-acc text-white' };
            var icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-triangle-exclamation' };
            var el = document.createElement('div');
            el.className = 'pointer-events-auto ' + (colors[type] || colors.info) + ' px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium toast-in max-w-[280px]';
            el.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + ' flex-shrink-0"></i><span>' + msg + '</span>';
            c.appendChild(el);
            setTimeout(function() { el.classList.remove('toast-in'); el.classList.add('toast-out'); setTimeout(function() { el.remove(); }, 300) }, 2500);
        }

        function sortItems(items) {
            return items.sort(function(a, b) {
                var cc = (a.cat || a.category || '').localeCompare(b.cat || b.category || '');
                if (cc !== 0) return cc;
                var sa = parseML(a.pack), sb = parseML(b.pack);
                if (sa !== sb) return sa - sb;
                return (a.name || '').localeCompare(b.name || '');
            });
        }

        function getProducts() {
            if (!db) return [];
            var r = db.exec("SELECT id,sku,name,pack,units,price,category FROM products WHERE is_active=1 ORDER BY category,name,pack");
            if (!r.length) return [];
            var prods = r[0].values.map(function(row) { return { id: row[0], sku: row[1], name: row[2], pack: row[3], units: row[4], price: row[5], cat: row[6] } });
            return sortItems(prods);
        }

        function getAllProductsAdmin() {
            var r = db.exec("SELECT id,sku,name,pack,units,price,category,is_active,updated_at FROM products ORDER BY category,name,pack");
            if (!r.length) return [];
            var prods = r[0].values.map(function(row) { return { id: row[0], sku: row[1], name: row[2], pack: row[3], units: row[4], price: row[5], cat: row[6], active: row[7], updated: row[8] } });
            return sortItems(prods);
        }

        function getCategories() { var p = getProducts(); return ['All'].concat(Array.from(new Set(p.map(function(x) { return x.cat; })))) }
        function getP(id) { return getProducts().find(function(p) { return p.id === id; }) }
        function getCartItems() { return S.form.items.filter(function(i) { return i.cases > 0; }) }
        function cartTotal() { return getCartItems().reduce(function(s, i) { var p = getP(i.pid); return s + (p && p.price ? i.cases * p.price : 0) }, 0) }
        function cartLoad() { return getCartItems().reduce(function(s, i) { var p = getP(i.pid); return s + (p ? (parseML(p.pack) / 1000 + 0.02) * p.units * i.cases : 0) }, 0) }
        function cartCount() { return getCartItems().reduce(function(s, i) { return s + i.cases }, 0) }

        function getSetting(key, def) {
            if (!def) def = '';
            if (!db) return def;
            var r = db.exec("SELECT value FROM settings WHERE key='" + esc(key) + "'");
            return r.length ? r[0].values[0][0] : def;
        }

        function setSetting(key, val) { db.run("INSERT OR REPLACE INTO settings (key,value) VALUES ('" + esc(key) + "','" + esc(val) + "')"); saveDB() }

        function getFirm() { return { name: getSetting('firm_name', 'Vijayeswara Agencies'), gst: getSetting('firm_gst', ''), phone: getSetting('firm_phone', ''), address: getSetting('firm_address', '') } }

        function saveDB() {
            if (!db) return;
            try { var data = db.export(); var buf = new Uint8Array(data); var req = indexedDB.open('CoolDrinkDB', 1);
                req.onsuccess = function(e) { var idb = e.target.result; var tx = idb.transaction('database', 'readwrite'); var store = tx.objectStore('database'); store.put(buf, 'main') } } catch (e) { console.warn('Save DB error:', e) }
        }

        function getOrderItems(oid) {
            var r = db.exec("SELECT product_name,pack,cases,units_per_case,unit_price,line_total FROM order_items WHERE order_id='" + esc(oid) + "'");
            if (!r.length) return [];
            return r[0].values.map(function(row) { return { name: row[0], pack: row[1], cases: row[2], units: row[3], price: row[4], total: row[5] } });
        }

        function getOrderById(oid) {
            var r = db.exec("SELECT order_id,sp_username,sp_name,shop_name,shop_phone,shop_location,shop_lat,shop_lng,subtotal,discount,total,load_weight,order_date,status,bill_number,created_at FROM orders WHERE order_id='" + esc(oid) + "'");
            if (!r.length) return null;
            var row = r[0].values[0];
            return { id: row[0], sp: row[1], spName: row[2], shop: { name: row[3], phone: row[4], location: row[5], lat: row[6], lng: row[7] }, subtotal: row[8], discount: row[9], total: row[10], load: row[11], date: row[12], status: row[13] || 'open', billNo: row[14], ts: row[15] };
        }

        function getAssetById(id) {
            var r = db.exec("SELECT id,shop_name,shop_phone,shop_address,asset_number,photo,notes,created_at,created_by FROM assets WHERE id=" + id);
            if (!r.length) return null;
            var row = r[0].values[0];
            return { id: row[0], shopName: row[1], shopPhone: row[2], shopAddress: row[3], assetNumber: row[4], photo: row[5], notes: row[6], createdAt: row[7], createdBy: row[8] };
        }

        function getAllAssets() {
            var r = db.exec("SELECT id,shop_name,shop_phone,shop_address,asset_number,notes,created_at,created_by FROM assets ORDER BY created_at DESC");
            if (!r.length) return [];
            return r[0].values.map(function(row) { return { id: row[0], shopName: row[1], shopPhone: row[2], shopAddress: row[3], assetNumber: row[4], notes: row[5], createdAt: row[6], createdBy: row[7] } });
        }

        function getAllSalesPersons() {
            var r = db.exec("SELECT DISTINCT username,name,role,area FROM users WHERE is_active=1 AND role IN ('sales','ase') ORDER BY name");
            if (!r.length) return [];
            return r[0].values.map(function(row) { return { username: row[0], name: row[1], role: row[2], area: row[3] } });
        }

        // ============================================================
        // FIREBASE SYNC FUNCTIONS - FULL SYNC
        // ============================================================
        async function syncAllFromFirestore() {
            if (!firestore) {
                toast('Firebase not available', 'error');
                return;
            }
            
            if (S.isSyncingAll) {
                toast('Sync already in progress...', 'info');
                return;
            }
            
            S.isSyncingAll = true;
            S.syncStatus = 'syncing';
            render();
            toast('🔄 Syncing from cloud...', 'info');
            
            try {
                await syncOrdersFromFirestore();
                await syncProductsFromFirestore();
                await syncAssetsFromFirestore();
                await loadUsersFromFirestore();
                
                S.lastSyncTime = new Date().toISOString();
                S.syncStatus = 'synced';
                toast('✅ All data synced from cloud successfully!', 'success');
                render();
            } catch (e) {
                console.error('Sync error:', e);
                S.syncStatus = 'error';
                toast('Sync error: ' + e.message, 'error');
                render();
            } finally {
                S.isSyncingAll = false;
            }
        }

        // ============================================================
        // SYNC ORDERS FROM FIRESTORE
        // ============================================================
        async function syncOrdersFromFirestore() {
            if (!firestore) return;
            
            try {
                console.log('🔄 Syncing orders from Firebase...');
                const snapshot = await firestore.collection('orders').get();
                
                if (snapshot.empty) {
                    console.log('No orders in Firebase');
                    return;
                }
                
                let orderCount = 0;
                let itemCount = 0;
                
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    const orderId = doc.id;
                    
                    // Check if order exists locally
                    const existing = db.exec("SELECT order_id FROM orders WHERE order_id='" + esc(orderId) + "'");
                    const exists = existing.length > 0;
                    
                    if (exists) {
                        // Update existing order
                        db.run(`UPDATE orders SET 
                            sp_username='${esc(data.spUsername || '')}',
                            sp_name='${esc(data.spName || '')}',
                            shop_name='${esc(data.shopName || '')}',
                            shop_phone='${esc(data.shopPhone || '')}',
                            shop_location='${esc(data.shopLocation || '')}',
                            shop_lat=${data.shopLat || 'NULL'},
                            shop_lng=${data.shopLng || 'NULL'},
                            subtotal=${data.subtotal || 0},
                            discount=${data.discount || 0},
                            total=${data.total || 0},
                            load_weight=${data.loadWeight || 0},
                            order_date='${esc(data.orderDate || today())}',
                            status='${esc(data.status || 'open')}',
                            bill_number=${data.billNumber || 'NULL'},
                            created_at='${esc(data.createdAt || new Date().toISOString())}'
                            WHERE order_id='${esc(orderId)}'`);
                    } else {
                        // Insert new order
                        db.run(`INSERT INTO orders 
                            (order_id, sp_username, sp_name, shop_name, shop_phone, shop_location, shop_lat, shop_lng, subtotal, discount, total, load_weight, order_date, status, bill_number, created_at)
                            VALUES (
                                '${esc(orderId)}',
                                '${esc(data.spUsername || '')}',
                                '${esc(data.spName || '')}',
                                '${esc(data.shopName || '')}',
                                '${esc(data.shopPhone || '')}',
                                '${esc(data.shopLocation || '')}',
                                ${data.shopLat || 'NULL'},
                                ${data.shopLng || 'NULL'},
                                ${data.subtotal || 0},
                                ${data.discount || 0},
                                ${data.total || 0},
                                ${data.loadWeight || 0},
                                '${esc(data.orderDate || today())}',
                                '${esc(data.status || 'open')}',
                                ${data.billNumber || 'NULL'},
                                '${esc(data.createdAt || new Date().toISOString())}'
                            )`);
                    }
                    orderCount++;
                    
                    // Sync order items
                    const itemsSnapshot = await firestore.collection('order_items')
                        .where('orderId', '==', orderId).get();
                    
                    // Delete existing items for this order
                    db.run("DELETE FROM order_items WHERE order_id='" + esc(orderId) + "'");
                    
                    for (const itemDoc of itemsSnapshot.docs) {
                        const itemData = itemDoc.data();
                        db.run(`INSERT INTO order_items 
                            (order_id, product_id, product_name, pack, cases, units_per_case, unit_price, line_total)
                            VALUES (
                                '${esc(orderId)}',
                                ${itemData.productId || 0},
                                '${esc(itemData.productName || '')}',
                                '${esc(itemData.pack || '')}',
                                ${itemData.cases || 0},
                                ${itemData.unitsPerCase || 24},
                                ${itemData.unitPrice || 'NULL'},

            if (r.length && r[0].values[0][0] === S.user) { toast('Cannot delete your own account', 'error'); return }
            if (!confirm('Delete this user permanently?')) return;
            
            S.syncStatus = 'syncing';
            render();
            
            try {
                db.run("DELETE FROM users WHERE id=" + id);
                saveDB();
                await deleteUserFromFirestore(id);
                S.syncStatus = 'synced';
                toast('🗑️ User deleted from local & cloud', 'info');
                render();
            } catch (e) {
                S.syncStatus = 'error';
                toast('Error: ' + e.message, 'error');
                render();
            }
        }

        // ============================================================
        // LOGIN / LOGOUT
        // ============================================================
        function handleLogin() {
            var username = document.getElementById('login-user').value.trim().toLowerCase();
            var password = document.getElementById('login-pass').value;
            if (!username || !password) { toast('Please enter username and password', 'error'); return }
            var r = db.exec("SELECT id,username,name,role,area FROM users WHERE username='" + esc(username) + "' AND password='" + esc(password) + "' AND is_active=1");
            if (!r.length) { toast('Invalid credentials', 'error'); return }
            var row = r[0].values[0];
            S.user = row[1];
            S.userName = row[2];
            S.role = row[3];
            S.view = 'app';
            S.adminDate = today();
            S.loadSelection = {};
            S._skipEnsure = false;
            if (S.role === 'sales') S.view = 'new-order';
            else if (S.role === 'ase') S.view = 'ase-dashboard';
            else S.adminView = 'dashboard';
            resetForm();
            
            // Auto-sync data from cloud on login
            if (firestore) {
                setTimeout(function() {
                    syncAllFromFirestore();
                }, 500);
            }
            
            toast('Welcome, ' + S.userName + '!');
            render();
        }

        function logout() { 
            S.user = null; 
            S.role = null; 
            S.userName = ''; 
            S.view = 'login'; 
            S.adminView = 'dashboard'; 
            S.adminSP = ''; 
            S.orderDetailId = null; 
            S.loadSelection = {}; 
            S._skipEnsure = false; 
            S.assetPhoto = ''; 
            S.assetPhotoPreview = ''; 
            S.assetFile = null; 
            S.moreMenuOpen = false; 
            S.isUploading = false; 
            S.uploadProgress = 0; 
            resetForm(); 
            render() 
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================
        function render() {
            var app = document.getElementById('app');
            if (!app) { console.error('App element not found!'); return; }
            
            if (!S.dbReady) {
                app.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-surface"><div class="text-center"><i class="fa-solid fa-spinner spinner text-pri text-3xl"></i><p class="mt-3 text-gray-500 text-sm">Loading database...</p></div></div>';
                return;
            }
            if (S.view === 'login') { renderLogin(); return; }
            if (S.role === 'sales') { renderSalesApp(); return; }
            if (S.role === 'ase') { renderASEApp(); return; }
            if (S.role === 'admin') { renderAdminApp(); return; }
        }

            var firm = getFirm();
            app.innerHTML =

                '<i class="fa-solid fa-truck-fast text-white text-3xl mb-2"></i>' +

                '<p class="text-pri-100 text-xs mt-1">Distribution Management System</p>' +

                '<div class="mb-4"><label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Username</label><input id="login-user" type="text" class="w-full mt-1 px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pri focus:border-transparent" placeholder="Enter username" autocomplete="username"></div>' +
                '<div class="mb-5"><label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Password</label><input id="login-pass" type="password" class="w-full mt-1 px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pri focus:border-transparent" placeholder="Enter password" autocomplete="current-password"></div>' +

        // ============================================================
        // SALES APP
        // ============================================================
        function renderSalesApp() {

            var tabs = [
                { id: 'new-order', icon: 'fa-cart-plus', label: 'New Order' },

                    return '<div class="mobile-tab flex-1 ' + (S.view === t.id ? 'active' : '') + '" onclick="S.view=\'' + t.id + '\';S.cartOpen=false;render();"><i class="fa-solid ' + t.icon + '"></i><span>' + t.label + '</span></div>';

        // ============================================================
        // NEW ORDER
        // ============================================================
        function renderNewOrder() {
            var prods = getProducts();
            var cats = getCategories();
            var filtered = S.catFilter === 'All' ? prods : prods.filter(function(p) { return p.cat === S.catFilter });
            if (S.search) { var q = S.search.toLowerCase(); filtered = filtered.filter(function(p) { return p.name.toLowerCase().indexOf(q) > -1 || p.pack.toLowerCase().indexOf(q) > -1 || p.sku.toLowerCase().indexOf(q) > -1 }) }
            var items = getCartItems();
            var total = cartTotal();
            var load = cartLoad();
            var count = cartCount();

            var catPills = '<div class="flex gap-2 overflow-x-auto pb-2 no-print" style="-webkit-overflow-scrolling:touch">' +
                cats.map(function(c) {
                    return '<button class="cat-pill px-3 py-1.5 rounded-full text-xs font-medium border border-gray-200 bg-white ' + (S.catFilter === c ? 'active' : 'text-gray-600') + '" onclick="S.catFilter=\'' + c + '\';render();">' + c + '</button>';
                }).join('') + '</div>';

            var prodGrid = '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">';
            filtered.forEach(function(p) {
                var ci = S.form.items.find(function(i) { return i.pid === p.id });
                var qty = ci ? ci.cases : 0;
                var hasQ = qty > 0;
                prodGrid += '<div class="product-card bg-white rounded-xl border-2 ' + (hasQ ? 'has-qty border-pri' : 'border-gray-100') + ' p-2.5 card-shadow">' +
                    '<div class="flex items-start justify-between mb-1"><span class="text-[10px] text-gray-400">' + escH(p.sku) + '</span>' + (hasQ ? '<span class="bg-pri text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">' + qty + '</span>' : '') + '</div>' +
                    '<div class="font-semibold text-xs leading-tight mb-0.5">' + escH(p.name) + '</div>' +
                    '<div class="text-[10px] text-gray-500 mb-1">' + escH(p.pack) + ' x ' + p.units + '</div>' +
                    '<div class="text-xs font-bold text-pri mb-2">' + (p.price ? fmt(p.price) : 'N/A') + '</div>' +
                    '<div class="flex items-center justify-center gap-2">' +
                    '<div class="qty-btn bg-gray-100 text-gray-700" onclick="changeQty(' + p.id + ',-1)">-</div>' +
                    '<input type="number" value="' + qty + '" class="w-10 text-center text-sm font-bold bg-gray-50 border border-gray-200 rounded-lg py-1" onchange="setQty(' + p.id + ',this.value)" onclick="this.select()">' +
                    '<div class="qty-btn bg-pri text-white" onclick="changeQty(' + p.id + ',1)">+</div>' +
                    '</div></div>';
            });
            prodGrid += '</div>';

            var shopForm =
                '<div class="bg-white rounded-xl p-3 card-shadow mb-3 no-print">' +
                '<h3 class="font-display font-semibold text-sm mb-3 flex items-center gap-2"><i class="fa-solid fa-store text-pri"></i>Shop Details</h3>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-2">' +
                '<input id="f-shop" type="text" value="' + escH(S.form.shopName) + '" placeholder="Shop Name *" class="px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pri" onchange="S.form.shopName=this.value">' +
                '<input id="f-phone" type="tel" value="' + escH(S.form.shopPhone) + '" placeholder="Phone Number *" class="px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pri" onchange="S.form.shopPhone=this.value">' +
                '<input id="f-loc" type="text" value="' + escH(S.form.shopLocation) + '" placeholder="Location *" class="px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pri sm:col-span-2" onchange="S.form.shopLocation=this.value">' +
                '</div>' +
                '<div class="flex items-center gap-2 mt-2">' +
                '<button onclick="getLocation()" class="text-xs text-pri flex items-center gap-1 touch-target"><i class="fa-solid fa-location-dot"></i>GPS</button>' +
                (S.form.shopLat ? '<span class="text-[10px] text-green-600"><i class="fa-solid fa-check"></i> Captured</span>' : '') +
                (S.editingOrderId ? '<span class="ml-auto text-[10px] text-acc font-semibold"><i class="fa-solid fa-pen"></i> Editing: ' + S.editingOrderId + '</span>' : '') +
                '</div></div>';

            var searchBar =
                '<div class="mb-2 no-print"><div class="relative"><i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i><input type="text" value="' + escH(S.search) + '" placeholder="Search products..." class="w-full pl-8 pr-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-pri" oninput="S.search=this.value;render();"></div></div>';

            return '<div class="p-3 max-w-4xl mx-auto pb-24">' + shopForm + searchBar + catPills + prodGrid + '</div>' + cartBarHtml;

        function renderCartBar(items, total, load, count) {
            return '<div class="cart-bar-fixed" style="bottom:64px;">' +
                (S.cartOpen ? renderCartPanel(items, total, load) : '') +
                '<div class="bg-pri-dark text-white px-3 py-2.5 flex items-center justify-between cursor-pointer rounded-t-xl mx-2 shadow-lg" onclick="S.cartOpen=!S.cartOpen;render();">' +
                '<div class="flex items-center gap-3"><div class="bg-white/20 rounded-lg px-2.5 py-1 text-xs font-bold">' + count + ' Cases</div><div class="text-xs"><div class="font-bold">' + fmt(total) + '</div><div class="text-pri-100 text-[10px]">' + fmtKg(load) + '</div></div></div>' +
                '<div class="flex items-center gap-2"><span class="text-xs text-pri-100">Tap</span><i class="fa-solid ' + (S.cartOpen ? 'fa-chevron-down' : 'fa-chevron-up') + ' text-xs"></i></div>' +
                '</div></div>';
        }

        function renderCartPanel(items, total, load) {
            var disc = S.form.discount || 0;
            var rows = items.map(function(i) { var p = getP(i.pid); if (!p) return ''; return '<div class="flex items-center justify-between py-1.5 border-b border-gray-50"><div class="flex-1 min-w-0"><div class="text-xs font-medium truncate">' + escH(p.name) + ' <span class="text-gray-400">' + escH(p.pack) + '</span></div></div><div class="flex items-center gap-2 ml-2"><span class="text-xs font-bold text-pri">' + i.cases + 'cs</span><span class="text-[10px] text-gray-400">' + fmtN(i.cases * p.price) + '</span><i class="fa-solid fa-xmark text-gray-300 text-xs cursor-pointer" onclick="changeQty(' + i.pid + ',' + (-i.cases) + ')"></i></div></div>' }).join('');
            return '<div class="bg-white rounded-t-2xl shadow-xl max-h-[50vh] overflow-y-auto" style="animation:slideUp .2s ease">' +
                '<div class="sticky top-0 bg-white px-3 py-2 border-b border-gray-100 flex items-center justify-between"><span class="font-display font-semibold text-sm">Cart (' + items.length + ' items)</span><i class="fa-solid fa-xmark text-gray-400 cursor-pointer touch-target" onclick="S.cartOpen=false;render();"></i></div>' +
                '<div class="px-3">' + rows + '</div>' +
                '<div class="px-3 py-2 border-t border-gray-100 bg-gray-50">' +
                '<div class="flex items-center gap-2 mb-2"><label class="text-[10px] text-gray-500">Discount (₹):</label><input type="number" value="' + disc + '" class="w-24 px-2 py-1 border border-gray-200 rounded-lg text-xs" onchange="S.form.discount=parseInt(this.value)||0;render();"></div>' +
                '<div class="flex justify-between text-xs mb-1"><span>Subtotal</span><span class="font-semibold">' + fmt(total) + '</span></div>' + (disc > 0 ? '<div class="flex justify-between text-xs mb-1 text-red-500"><span>Discount</span><span>- ' + fmtN(disc) + '</span></div>' : '') +
                '<div class="flex justify-between text-sm font-bold border-t border-gray-200 pt-1 mt-1"><span>Net Total</span><span class="text-pri">' + fmt(total - disc) + '</span></div>' +
                '<div class="flex gap-2 mt-3">' +
                (S.editingOrderId ? '<button onclick="cancelEdit()" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 text-xs font-semibold btn-press touch-target">Cancel Edit</button>' : '') +
                '<button onclick="submitOrder()" class="flex-1 py-2.5 rounded-xl bg-pri text-white text-xs font-semibold btn-press touch-target ' + (S.editingOrderId ? '' : 'col-span-2 sm:col-span-1') + '">' + (S.editingOrderId ? 'Update Order' : 'Submit Order') + '</button>' +
                '</div></div></div>';
        }

        function renderMyOrders() {
            var orders = db.exec("SELECT order_id,shop_name,shop_phone,shop_location,subtotal,discount,total,load_weight,order_date,status,created_at FROM orders WHERE sp_username='" + esc(S.user) + "' ORDER BY created_at DESC");
            if (!orders.length || !orders[0].values.length) return '<div class="p-4 text-center text-gray-400 mt-16"><i class="fa-solid fa-inbox text-4xl mb-3"></i><p class="text-sm">No orders yet</p><button onclick="syncAllFromFirestore()" class="mt-3 text-xs text-pri underline">Sync from cloud</button></div>';
            var cards = orders[0].values.map(function(o) {
                var statusClr = o[9] === 'closed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';

                    '<div class="flex items-start justify-between mb-1.5"><div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">' + escH(o[1]) + '</div><div class="text-[10px] text-gray-400">' + escH(o[3]) + ' | ' + escH(o[2]) + '</div></div><span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ' + statusClr + ' flex-shrink-0 ml-2">' + statusTxt + '</span></div>' +
                    '<div class="flex items-center justify-between"><div class="text-xs text-gray-500">' + fmtDate(o[8]) + ' | ' + fmtKg(o[7]) + '</div><div class="font-bold text-sm text-pri">' + fmt(o[6]) + '</div></div>' +
                    '<div class="flex gap-1.5 mt-2 pt-2 border-t border-gray-50">' +
                    '<button onclick="viewOrderDetail(\'' + o[0] + '\')" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-gray-50 text-gray-600 btn-press touch-target"><i class="fa-solid fa-eye mr-1"></i>View</button>' +
                    '<button onclick="printBill(\'' + o[0] + '\')" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-gray-50 text-gray-600 btn-press touch-target"><i class="fa-solid fa-print mr-1"></i>Bill</button>' +
                    (o[9] === 'open' ? '<button onclick="editOrder(\'' + o[0] + '\')" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-pri-50 text-pri btn-press touch-target"><i class="fa-solid fa-pen mr-1"></i>Edit</button>' : '') +
                    (o[9] === 'open' ? '<button onclick="closeOrder(\'' + o[0] + '\')" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-green-50 text-green-700 btn-press touch-target"><i class="fa-solid fa-check mr-1"></i>Deliver</button>' : '') +
                    '<button onclick="deleteOrder(\'' + o[0] + '\')" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-red-50 text-red-600 btn-press touch-target ml-auto"><i class="fa-solid fa-trash"></i></button>' +
                    '</div></div>';
            }).join('');
            return '<div class="p-3 max-w-2xl mx-auto"><h2 class="font-display font-bold text-base mb-3">My Orders</h2>' + cards + '</div>';
        }

        // ============================================================
        // SALES LOAD SHEET
        // ============================================================
        function renderSalesLoadSheet() {
            var outlets = db.exec("SELECT order_id,shop_name FROM orders WHERE sp_username='" + esc(S.user) + "' AND order_date='" + today() + "' ORDER BY shop_name");
            var outletData = outlets.length ? outlets[0].values.map(function(row) { return { orderId: row[0], shopName: row[1] } }) : [];
            var selIds = Object.keys(S.loadSelection).filter(function(k) { return S.loadSelection[k] });

            var sheet = getLoadSheet(today(), S.user, selIds);

            var outletListHtml =
                '<div class="bg-white rounded-xl p-3 card-shadow mb-3">' +
                '<div class="flex items-center justify-between mb-2"><h3 class="font-display font-semibold text-sm">Select Outlets (' + selIds.length + '/' + outletData.length + ')</h3>' +
                '<div class="flex gap-1.5"><button onclick="selectAllOutlets()" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-pri text-white btn-press touch-target">Select All</button><button onclick="clearOutlets()" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-600 btn-press touch-target">Clear</button></div></div>';
            if (!outletData.length) outletListHtml += '<p class="text-xs text-gray-400 text-center py-4">No orders today</p>';
            else outletListHtml += '<div class="max-h-40 overflow-y-auto space-y-1">' + outletData.map(function(o) {
                var checked = selIds.indexOf(o.orderId) > -1;
                return '<label class="flex items-center gap-2.5 py-1.5 px-2 rounded-lg cursor-pointer ' + (checked ? 'bg-pri-50' : 'hover:bg-gray-50') + ' touch-target"><input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleOutlet(\'' + o.orderId + '\')" class="w-4 h-4 accent-pri rounded"><span class="text-xs flex-1">' + escH(o.shopName) + '</span></label>';
            }).join('') + '</div>';
            outletListHtml += '</div>';

            var loadTable = '<div class="bg-white rounded-xl card-shadow overflow-hidden mb-3">';
            if (sheet.items.length) {
                var lastCat = '';
                var srNum = 0;
                var tRows = '';
                sortItems(sheet.items).forEach(function(it) {
                    if (it.cat !== lastCat) { srNum = 0; tRows += '<tr class="rpt-cat-row"><td colspan="4" class="!text-[10px]">' + escH(it.cat) + '</td></tr>'; lastCat = it.cat }
                    srNum++;
                    tRows += '<tr><td class="!text-[11px]">' + srNum + '</td><td class="!text-[11px]">' + escH(it.name) + '<br><span class="text-gray-400 text-[9px]">' + escH(it.pack) + '</span></td><td class="!text-[11px] text-center">' + it.cases + '</td><td class="!text-[11px] text-right">' + (it.amount ? fmtN(it.amount) : '-') + '</td></tr>';
                });
                loadTable += '<div class="overflow-x-auto"><table class="rpt-table w-full"><tr><th>#</th><th>Product</th><th class="text-center">Cases</th><th class="text-right">Amount</th></tr>' + tRows + '</table></div>';
            } else loadTable += '<div class="p-6 text-center text-gray-400 text-sm"><i class="fa-solid fa-box-open text-2xl mb-2"></i><p>No items</p></div>';
            loadTable +=
                '<div class="p-3 bg-gray-50 border-t border-gray-100 grid grid-cols-2 gap-2 text-xs">' +
                '<div><span class="text-gray-500 block text-[10px]">Cases</span><span class="font-bold">' + sheet.items.reduce(function(s, i) { return s + i.cases }, 0) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Net</span><span class="font-bold text-pri">' + fmtN(sheet.items.reduce(function(s, i) { return s + i.amount }, 0) - sheet.totalDiscount) + '</span></div>' +
                '</div></div>';

            var printBtn = '<button onclick="printLoadSheet(\'' + today() + '\',\'' + esc(S.user) + '\',\'selected\')" class="w-full py-3 rounded-xl bg-pri text-white font-semibold text-sm btn-press touch-target"><i class="fa-solid fa-print mr-2"></i>Print Load Sheet + Bills</button>';

            return '<div class="p-3 max-w-2xl mx-auto"><h2 class="font-display font-bold text-base mb-3">Load Sheet - ' + fmtDate(today()) + '</h2>' + outletListHtml + loadTable + printBtn + '</div>';
        }

        // ============================================================
        // ASE LOAD SHEET
        // ============================================================
        function renderASELoadSheet() {
            var spData = getAllSalesPersons();
            var outlets = db.exec("SELECT order_id,shop_name,sp_name,sp_username,status FROM orders WHERE order_date='" + esc(S.adminDate) + "'" + (S.adminSP ? " AND sp_username='" + esc(S.adminSP) + "'" : "") + " ORDER BY shop_name");
            var outletData = outlets.length ? outlets[0].values.map(function(row) { return { orderId: row[0], shopName: row[1], spName: row[2], spUsername: row[3], status: row[4] || 'open' } }) : [];

            ensureLoadSelection(outletData);
            var selIds = getSelectedOrderIds();

            var sheet = getLoadSheet(S.adminDate, S.adminSP, selIds);

            var filters =
                '<div class="bg-white rounded-xl p-3 card-shadow mb-3"><div class="grid grid-cols-1 sm:grid-cols-3 gap-2">' +
                '<input type="date" value="' + S.adminDate + '" class="px-3 py-2 border border-gray-200 rounded-xl text-sm" onchange="S.adminDate=this.value;S._skipEnsure=true;render();">' +
                '<select class="px-3 py-2 border border-gray-200 rounded-xl text-sm" onchange="S.adminSP=this.value;S._skipEnsure=true;render();"><option value="">All Sales Persons</option>' +
                spData.map(function(sp) { return '<option value="' + sp.username + '" ' + (S.adminSP === sp.username ? 'selected' : '') + '>' + escH(sp.name) + '</option>' }).join('') +
                '</select>' +
                '<div class="text-xs text-gray-400 flex items-center justify-end">' + outletData.length + ' outlets</div>' +
                '</div></div>';

            var outletListHtml =
                '<div class="bg-white rounded-xl p-3 card-shadow mb-3">' +
                '<div class="flex items-center justify-between mb-2"><h3 class="font-display font-semibold text-sm">Outlets (' + selIds.length + '/' + outletData.length + ')</h3>' +
                '<div class="flex gap-1.5"><button onclick="selectAllOutlets()" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-pri text-white btn-press touch-target">Select All</button><button onclick="clearOutlets()" class="text-[10px] px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-600 btn-press touch-target">Clear</button></div></div>';
            if (!outletData.length) outletListHtml += '<p class="text-xs text-gray-400 text-center py-4">No orders for this date/filter</p>';
            else outletListHtml += '<div class="max-h-48 overflow-y-auto space-y-1">' + outletData.map(function(o) {
                var checked = selIds.indexOf(o.orderId) > -1;
                return '<label class="flex items-center gap-2.5 py-1.5 px-2 rounded-lg cursor-pointer ' + (checked ? 'bg-pri-50' : 'hover:bg-gray-50') + ' touch-target"><input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleOutlet(\'' + o.orderId + '\')" class="w-4 h-4 accent-pri rounded"><span class="text-xs flex-1">' + escH(o.shopName) + '</span><span class="text-[10px] text-gray-400">' + escH(o.spName) + '</span></label>';
            }).join('') + '</div>';
            outletListHtml += '</div>';

            var loadTable = '<div class="bg-white rounded-xl card-shadow overflow-hidden mb-3">';
            if (sheet.items.length) {
                var lastCat = '';
                var srNum = 0;
                var tRows = '';
                sortItems(sheet.items).forEach(function(it) {
                    if (it.cat !== lastCat) { srNum = 0; tRows += '<tr class="rpt-cat-row"><td colspan="5" class="!text-[10px]">' + escH(it.cat) + '</td></tr>'; lastCat = it.cat }
                    srNum++;
                    tRows += '<tr><td class="!text-[11px]">' + srNum + '</td><td class="!text-[11px]">' + escH(it.name) + '<br><span class="text-gray-400 text-[9px]">' + escH(it.pack) + '</span></td><td class="!text-[11px] text-center">' + it.cases + '</td><td class="!text-[11px] text-center">' + (it.cases * it.units) + '</td><td class="!text-[11px] text-right">' + (it.amount ? fmtN(it.amount) : '-') + '</td></tr>';
                });
                loadTable += '<div class="overflow-x-auto"><table class="rpt-table w-full"><tr><th>#</th><th>Product</th><th class="text-center">Cases</th><th class="text-center">Units</th><th class="text-right">Amount</th></tr>' + tRows + '</table></div>';
            } else loadTable += '<div class="p-6 text-center text-gray-400 text-sm"><i class="fa-solid fa-box-open text-2xl mb-2"></i><p>No items</p></div>';
            loadTable +=
                '<div class="p-3 bg-gray-50 border-t border-gray-100 grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">' +
                '<div><span class="text-gray-500 block text-[10px]">Cases</span><span class="font-bold">' + sheet.items.reduce(function(s, i) { return s + i.cases }, 0) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Units</span><span class="font-bold">' + sheet.items.reduce(function(s, i) { return s + i.cases * i.units }, 0) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Gross</span><span class="font-bold">' + fmtN(sheet.items.reduce(function(s, i) { return s + i.amount }, 0)) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Net</span><span class="font-bold text-pri">' + fmtN(sheet.items.reduce(function(s, i) { return s + i.amount }, 0) - sheet.totalDiscount) + '</span></div>' +
                '</div></div>';

            var printBtn = selIds.length > 0 ?
                '<button onclick="printLoadSheet(\'' + S.adminDate + '\',\'' + esc(S.adminSP) + '\',\'selected\')" class="w-full py-3 rounded-xl bg-acc text-white font-semibold text-sm btn-press touch-target"><i class="fa-solid fa-print mr-2"></i>Print Load Sheet + Bills</button>' :
                '<button onclick="printLoadSheet(\'' + S.adminDate + '\',\'' + esc(S.adminSP) + '\',\'all\')" class="w-full py-3 rounded-xl bg-pri text-white font-semibold text-sm btn-press touch-target"><i class="fa-solid fa-print mr-2"></i>Print Full Load Sheet + Bills</button>';
            return '<div class="p-3 max-w-4xl mx-auto"><h2 class="font-display font-bold text-base mb-3">Load Sheets</h2>' + filters + outletListHtml + loadTable + printBtn + '</div>';
        }

        function renderAdminLoadSheet() {

                '<div class="bg-white rounded-xl p-3 card-shadow mb-3"><div class="grid grid-cols-1 sm:grid-cols-3 gap-2">' +

                '<select class="px-3 py-2 border border-gray-200 rounded-xl text-sm" onchange="S.adminSP=this.value;S._skipEnsure=true;render();"><option value="">All Sales Persons</option>' +
                spData.map(function(sp) { return '<option value="' + sp.username + '" ' + (S.adminSP === sp.username ? 'selected' : '') + '>' + escH(sp.name) + '</option>' }).join('') +
                '</select>' +
                '<div class="text-xs text-gray-400 flex items-center justify-end">' + outletData.length + ' outlets</div>' +

                var checked = selIds.indexOf(o.orderId) > -1;
                return '<label class="flex items-center gap-2.5 py-1.5 px-2 rounded-lg cursor-pointer ' + (checked ? 'bg-pri-50' : 'hover:bg-gray-50') + ' touch-target"><input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleOutlet(\'' + o.orderId + '\')" class="w-4 h-4 accent-pri rounded"><span class="text-xs flex-1">' + escH(o.shopName) + '</span><span class="text-[10px] text-gray-400">' + escH(o.spName) + '</span></label>';
            }).join('') + '</div>';
            outletListHtml += '</div>';

            var loadTable = '<div class="bg-white rounded-xl card-shadow overflow-hidden mb-3">';
            if (sheet.items.length) {
                var lastCat = '';
                var srNum = 0;
                var tRows = '';
                sortItems(sheet.items).forEach(function(it) {
                    if (it.cat !== lastCat) { srNum = 0; tRows += '<tr class="rpt-cat-row"><td colspan="5" class="!text-[10px]">' + escH(it.cat) + '</td></tr>'; lastCat = it.cat }
                    srNum++;
                    tRows += '<tr><td class="!text-[11px]">' + srNum + '</td><td class="!text-[11px]">' + escH(it.name) + '<br><span class="text-gray-400 text-[9px]">' + escH(it.pack) + '</span></td><td class="!text-[11px] text-center">' + it.cases + '</td><td class="!text-[11px] text-center">' + (it.cases * it.units) + '</td><td class="!text-[11px] text-right">' + (it.amount ? fmtN(it.amount) : '-') + '</td></tr>';
                });
                loadTable += '<div class="overflow-x-auto"><table class="rpt-table w-full"><tr><th>#</th><th>Product</th><th class="text-center">Cases</th><th class="text-center">Units</th><th class="text-right">Amount</th></tr>' + tRows + '</table></div>';
            } else loadTable += '<div class="p-6 text-center text-gray-400 text-sm"><i class="fa-solid fa-box-open text-2xl mb-2"></i><p>No items</p></div>';
            loadTable +=
                '<div class="p-3 bg-gray-50 border-t border-gray-100 grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">' +
                '<div><span class="text-gray-500 block text-[10px]">Cases</span><span class="font-bold">' + sheet.items.reduce(function(s, i) { return s + i.cases }, 0) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Units</span><span class="font-bold">' + sheet.items.reduce(function(s, i) { return s + i.cases * i.units }, 0) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Gross</span><span class="font-bold">' + fmtN(sheet.items.reduce(function(s, i) { return s + i.amount }, 0)) + '</span></div>' +
                '<div><span class="text-gray-500 block text-[10px]">Net</span><span class="font-bold text-pri">' + fmtN(sheet.items.reduce(function(s, i) { return s + i.amount }, 0) - sheet.totalDiscount) + '</span></div>' +
                '</div></div>';

                '<button onclick="printLoadSheet(\'' + S.adminDate + '\',\'' + esc(S.adminSP) + '\',\'selected\')" class="w-full py-3 rounded-xl bg-acc text-white font-semibold text-sm btn-press touch-target"><i class="fa-solid fa-print mr-2"></i>Print Load Sheet + Bills</button>' :

            return '<div class="p-3 md:p-6 max-w-4xl mx-auto"><h2 class="font-display font-bold text-base mb-3">Load Sheets</h2>' + filters + outletListHtml + loadTable + printBtn + '</div>';

                '<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">' +

                '<div></div></div>' +
                (S.rptPeriod === 'custom' ? '<div class="grid grid-cols-2 gap-2"><input type="date" value="' + S.rptFrom + '" class="px-3 py-2 border border-gray-200 rounded-xl text-sm" onchange="S.rptFrom=this.value;render();"><input type="date" value="' + S.rptTo + '" class="px-3 py-2 border border-gray-200 rounded-xl text-sm" onchange="S.rptTo=this.value;render();"></div>' : '') +

                '<div class="bg-white rounded-xl p-3 card-shadow text-center"><div class="text-lg font-bold">' + reportData.summary.cases + '</div><div class="text-[10px] text-gray-500">Cases</div></div>' +
                '<div class="bg-white rounded-xl p-3 card-shadow text-center"><div class="text-lg font-bold">' + reportData.summary.units + '</div><div class="text-[10px] text-gray-500">Units</div></div>' +

                '<div class="bg-white rounded-xl p-3 card-shadow text-center col-span-2 sm:col-span-1"><div class="text-lg font-bold text-acc">' + fmtN(reportData.summary.value - reportData.summary.discount) + '</div><div class="text-[10px] text-gray-500">Net</div></div></div>';

            var table = '<div class="bg-white rounded-xl card-shadow overflow-hidden mb-3">';
            if (reportData.items.length) {
                var lastCat = '';
                var srNum = 0;
                var tRows = '';
                var totalValue = reportData.summary.value;
                reportData.items.forEach(function(it) {
                    if (it.cat !== lastCat) {
                        var catItems = reportData.items.filter(function(x) { return x.cat === it.cat });
                        var catTotal = catItems.reduce(function(s, x) { return s + x.value }, 0);
                        var catPct = totalValue > 0 ? ((catTotal / totalValue) * 100).toFixed(1) : 0;
                        tRows += '<tr class="rpt-cat-row"><td colspan="4" class="!text-[10px]">' + escH(it.cat) + ' <span class="font-normal text-gray-500">(₹' + fmtN(catTotal) + ' - ' + catPct + '%)</span></td></tr>';

        function getLoadSheet(date, spFilter, selectedIds) {
            var sql = "SELECT oi.product_name,oi.pack,oi.cases,oi.units_per_case,oi.unit_price,oi.line_total,p.category FROM order_items oi JOIN orders o ON oi.order_id=o.order_id JOIN products p ON oi.product_id=p.id WHERE o.order_date='" + esc(date) + "'";
            if (spFilter) sql += " AND o.sp_username='" + esc(spFilter) + "'";
            if (selectedIds && selectedIds.length > 0) {
                sql += " AND o.order_id IN ('" + selectedIds.map(function(id) { return esc(id) }).join("','") + "')";
            }
            var r = db.exec(sql);
            var items = [];
            var totalDiscount = 0;
            if (r.length) {
                var agg = {};
                r[0].values.forEach(function(row) { var key = row[0] + '|' + row[1]; if (!agg[key]) agg[key] = { name: row[0], pack: row[1], cases: 0, units: row[3], price: row[4], amount: 0, cat: row[6] }; agg[key].cases += row[2]; if (row[4]) agg[key].price = row[4] });
                Object.values(agg).forEach(function(it) { it.amount = it.price ? it.cases * it.price : 0 });
                items = Object.values(agg);
                var discSql = "SELECT COALESCE(SUM(discount),0) FROM orders WHERE order_date='" + esc(date) + "'" + (spFilter ? " AND sp_username='" + esc(spFilter) + "'" : "");
                if (selectedIds && selectedIds.length > 0) {
                    discSql += " AND order_id IN ('" + selectedIds.map(function(id) { return esc(id) }).join("','") + "')";
                }
                var dr = db.exec(discSql);
                if (dr.length) totalDiscount = dr[0].values[0][0];
            }
            return { items: items, totalDiscount: totalDiscount };
        }

        function getReportData(spFilter, period) {
            var range = getReportDateRange(period);
            var from = range.from;
            var to = range.to;

            var sql = "SELECT oi.product_name,oi.pack,oi.cases,oi.units_per_case,oi.unit_price,oi.line_total,p.category,o.sp_name FROM order_items oi JOIN orders o ON oi.order_id=o.order_id JOIN products p ON oi.product_id=p.id WHERE o.order_date>='" + esc(from) + "' AND o.order_date<='" + esc(to) + "'";
            if (spFilter) sql += " AND o.sp_username='" + esc(spFilter) + "'";
            var r = db.exec(sql);
            var items = [];
            var orderCount = 0;
            var totalDiscount = 0;
            var or3 = db.exec("SELECT COUNT(*), COALESCE(SUM(discount),0) FROM orders WHERE order_date>='" + esc(from) + "' AND order_date<='" + esc(to) + "'" + (spFilter ? " AND sp_username='" + esc(spFilter) + "'" : ""));
            if (or3.length) { orderCount = or3[0].values[0][0]; totalDiscount = or3[0].values[0][1]; }
            if (r.length) {
                var agg = {};
                r[0].values.forEach(function(row) { var key = row[0] + '|' + row[1]; if (!agg[key]) agg[key] = { name: row[0], pack: row[1], cases: 0, units: row[3], price: row[4], value: 0, cat: row[6], spName: row[7] }; agg[key].cases += row[2]; agg[key].value += row[5] || 0; if (row[4]) agg[key].price = row[4]; });
                items = sortItems(Object.values(agg));
            }
            var totalValue = items.reduce(function(s, i) { return s + i.value }, 0);
            var totalCases = items.reduce(function(s, i) { return s + i.cases }, 0);
            var totalUnits = items.reduce(function(s, i) { return s + i.cases * i.units }, 0);
            
            return {
                items: items,
                from: from,
                to: to,
                summary: {
                    orders: orderCount,
                    cases: totalCases,
                    units: totalUnits,
                    value: totalValue,
                    discount: totalDiscount
                }
            };
        }

        function getReportDateRange(period) {
            var d = new Date();
            var from, to;
            switch (period) {
                case 'thisWeek':
                    var day = d.getDay();
                    from = new Date(d);
                    from.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
                    from.setHours(0, 0, 0, 0);
                    to = new Date(d);
                    to.setHours(23, 59, 59, 999);
                    break;
                case 'lastWeek':
                    var day2 = d.getDay();
                    from = new Date(d);
                    from.setDate(d.getDate() - (day2 === 0 ? 6 : day2 - 1) - 7);
                    from.setHours(0, 0, 0, 0);
                    to = new Date(from);
                    to.setDate(from.getDate() + 6);
                    to.setHours(23, 59, 59, 999);
                    break;
                case 'thisMonth':
                    from = new Date(d.getFullYear(), d.getMonth(), 1);
                    to = new Date(d);
                    to.setHours(23, 59, 59, 999);
                    break;
                case 'lastMonth':
                    from = new Date(d.getFullYear(), d.getMonth() - 1, 1);
                    to = new Date(d.getFullYear(), d.getMonth(), 0, 23, 59, 59, 999);
                    break;
                case 'custom':
                    from = S.rptFrom ? new Date(S.rptFrom + 'T00:00:00') : new Date(d.getFullYear(), d.getMonth(), 1);
                    to = S.rptTo ? new Date(S.rptTo + 'T23:59:59') : new Date(d);
                    break;
                default:
                    from = new Date(d.getFullYear(), d.getMonth(), 1);
                    to = new Date(d);
                    to.setHours(23, 59, 59, 999);
            }
            return { from: from.toISOString().split('T')[0], to: to.toISOString().split('T')[0] };
        }

        async function syncOrderToFirestore(oid) {
            if (!firestore) return;
            try {
                var order = getOrderById(oid);
                if (order) {
                    await firestore.collection('orders').doc(oid).set({
                        orderId: order.id,
                        spUsername: order.sp,
                        spName: order.spName,
                        shopName: order.shop.name,
                        shopPhone: order.shop.phone,
                        shopLocation: order.shop.location,
                        shopLat: order.shop.lat,
                        shopLng: order.shop.lng,
                        subtotal: order.subtotal,
                        discount: order.discount,
                        total: order.total,
                        loadWeight: order.load,
                        orderDate: order.date,
                        status: order.status,
                        billNumber: order.billNo,
                        createdAt: order.ts || new Date().toISOString()
                    }, { merge: true });
                }
                var items = getOrderItems(oid);
                if (items.length > 0) {
                    var snapshot = await firestore.collection('order_items').where('orderId', '==', oid).get();
                    var batch = firestore.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        await firestore.collection('order_items').add({
                            orderId: oid,
                            productName: item.name,
                            pack: item.pack,
                            cases: item.cases,
                            unitsPerCase: item.units,
                            unitPrice: item.price,
                            lineTotal: item.total
                        });
                    }
                }
                console.log('✅ Synced order:', oid);
            } catch (e) {
                console.warn('⚠️ Firebase sync error:', e);
                throw e;
            }
        }

        async function syncProductToFirestore(productId) {
            if (!firestore) return;
            try {
                var r = db.exec("SELECT id,sku,name,pack,units,price,category,is_active,created_at,updated_at FROM products WHERE id=" + productId);
                if (!r.length) return;
                var row = r[0].values[0];
                await firestore.collection('products').doc(String(productId)).set({
                    id: row[0],
                    sku: row[1],
                    name: row[2],
                    pack: row[3],
                    units: row[4],
                    price: row[5],
                    category: row[6],
                    isActive: row[7],
                    createdAt: row[8],
                    updatedAt: row[9] || new Date().toISOString()
                }, { merge: true });
                console.log('✅ Synced product:', productId);
            } catch (e) {
                console.warn('⚠️ Firebase sync error:', e);
                throw e;
            }
        }

        function downloadAllOrders() {
            var orders = db.exec("SELECT order_id,sp_username,sp_name,shop_name,shop_phone,shop_location,subtotal,discount,total,load_weight,order_date,status,bill_number,created_at FROM orders ORDER BY created_at DESC");
            if (!orders.length || !orders[0].values.length) { toast('No orders to download', 'info'); return }
            var rows = orders[0].values;
            var headers = ['Order ID', 'Sales Person', 'Sales Name', 'Shop Name', 'Phone', 'Location', 'Subtotal', 'Discount', 'Total', 'Load (kg)', 'Date', 'Status', 'Bill No', 'Created At'];
            var csv = headers.join(',') + '\n';
            rows.forEach(function(row) {
                csv += row.map(function(cell) {
                    if (cell === null || cell === undefined) return '';
                    var s = String(cell);
                    if (s.includes(',') || s.includes('"') || s.includes('\n')) s = '"' + s.replace(/"/g, '""') + '"';
                    return s;
                }).join(',') + '\n';
            });
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'orders_' + today() + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            toast('Orders downloaded as CSV', 'success');
        }

        function handleAssetPhoto(input) {
            var file = input.files[0];
            if (!file) return;
            
            var validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                toast('Please upload JPEG, PNG, WEBP, or GIF images only', 'error');
                input.value = '';
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                toast('Image too large. Max 5MB allowed.', 'error');
                input.value = '';
                return;
            }
            
            S.assetFile = file;
            
            var reader = new FileReader();
            reader.onload = function(e) { 
                S.assetPhoto = e.target.result;
                S.assetPhotoPreview = e.target.result; 
                render() 
            };
            reader.readAsDataURL(file);
        }

        // ============================================================

        // ============================================================
        function selectAllOutlets() {
            var date = S.adminDate || today();
            var spFilter = S.adminSP || null;
            var sql = "SELECT order_id,shop_name FROM orders WHERE order_date='" + date + "'";
            if (spFilter) sql += " AND sp_username='" + esc(spFilter) + "'";
            sql += " ORDER BY shop_name";
            var outlets = db.exec(sql);
            var outletData = outlets.length ? outlets[0].values.map(function(row) { return { orderId: row[0], shopName: row[1] } }) : [];
            outletData.forEach(function(x) { S.loadSelection[x.orderId] = true });
            S._skipEnsure = true;
            render()
        }

        function clearOutlets() { S.loadSelection = {}; S._skipEnsure = true; render() }
        function toggleOutlet(orderId) { S.loadSelection[orderId] = !S.loadSelection[orderId]; render() }
